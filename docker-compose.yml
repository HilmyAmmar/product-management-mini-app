version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: product_db
    ports:
      - "5433:5432"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: supersecretpassword
      DB_NAME: product_db
      DB_PORT: 5432
      PORT: 8080
    depends_on:
      - db

  frontend:
    build: ./frontend/frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend